                <text class="titleText" x="15.7728125rem" y="8.64rem">A Method for Transforming a Broad Topic to a </text>
                <text class="titleText" x="13.4728125rem" y="11.14rem">Focused Topic for Developing Research Questions</text>
                <text class="subText" x="13.203125rem" y="14.64rem">Created in Spring 2020 - Fall 2020: Sophomore/Junior Year</text>

                <g id="bottom">
                    <g id="desc">
                    <text class="subText" x="40.5rem" y="51rem">Abstract</text>
                    <text x="13rem" y="54rem">In this research-to-practice full paper, the results of an approach for transforming topic ideas into questions for</text>
                    <text x="11rem" y="56rem">developing research questions are presented. The first step in developing research questions is identifying an</text>
                    <text x="11rem" y="58rem">interesting topic. Once a topic is identified, the next challenge is to narrow the focus by formulating and asking</text>
                    <text x="11rem" y="60rem">questions that, when answered, will provide more depth to the topic. For the novice researcher,articulating what </text>
                    <text x="11rem" y="62rem">needs to be learned about a topic and what the reader should understand about the topic can be challenging.</text>
                    <text x="11rem" y="64rem">The purpose of this study is to assess students’ perception of a method that is designed to challenge students to ask</text> 
                    <text x="11rem" y="66rem">critical questions of their research topics to better understand what they know about the topic; what remains to be </text>
                    <text x="11rem" y="68rem">known and what their target audience should understand about the topic as a result of the research. An activity worksheet </text>
                    <text x="11rem" y="70rem">was designed to facilitate critical thinking about the process of questioning and posing questions as part of the </text>
                    <text x="11rem" y="72rem">developing research questions process. Students were asked to complete the worksheet then provide feedback on the usability</text> 
                    <text x="11rem" y="74rem">of the activity worksheet. This work aims to answer the following research question, “How do students perceive the usability </text>
                    <text x="11rem" y="76rem">of the activity worksheet method for developing and evaluating questions about topic ideas?” The activity worksheet was </text>
                    <text x="11rem" y="78rem">completed by a 43 students across two sections of an undergraduate data visualization course in the Department of Computer </text>
                    <text x="11rem" y="80rem">Graphics Technology at Purdue University. After completing the worksheet students were asked to provide feedback on the </text>
                    <text x="11rem" y="82rem">usability of the worksheet, using a 5-point Likert scale: “1 - Strongly disagree,” “2 – Disagree,” “3 – Neutral,” </text>
                    <text x="11rem" y="84rem">“4 – Agree,” and “5 – Strongly Agree.” Students’ overall perception of the worksheet approach was favorable/positive. </text>
                    <text x="11rem" y="86rem">The implications of this work will help students build skills in questioning and posing questions. This</text>
                    <text x="11rem" y="88rem">research is significant because it helps students answer critical questions about their topic, and further clarify the </text>
                    <text x="11rem" y="90rem">significance of a topic beyond their own interests. The contribution of this work is in helping students pose questions </text>
                    <text x="11rem" y="92rem">and ask questions that will strengthen their critical thinking skills in the practice of engineering and computer science.</text>
