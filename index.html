<!DOCTYPE html>

<head>

<style>

body{

}
#content{
    top:0; 
    left:0; 
    height:768px;
    width:100%;  
}


#bartext{
    font-family: candara;
    font-weight: 300;
    font-size: 20pt;
    fill: white;
}

#bartext:hover{
   fill:rgb(141, 96, 224);
   font-weight:bold ;
}

#navbar{
    
      fill: url(#Gradient1); }
        .stop1 { stop-color: rgba(0, 0, 0, 1); }
        .stop2 { stop-color: rgba(0, 0, 0, .9); stop-opacity:1;}
        .stop3 { stop-color: rgba(0, 0, 0, 1); }
         

#navbar_bord{
    stroke: rgba(0, 0, 0, .7);
    stroke-width: 7px;
}

.select_box {
  opacity: 1;
  display: block;
  transition: 1s ease;
  backface-visibility: hidden;
}

.select_box:hover {
    opacity: 0.5;
    filter:url(#f1);
}

#about_me:hover .titletext {
  visibility: visible;
  opacity: 1;}

#resume:hover .titletext {
  visibility: visible;
  opacity: 1;}

#academic:hover .titletext {
  visibility: visible;
  opacity: 1;}

#data_center:hover .titletext {
  visibility: visible;
  opacity: 1;}

.titletext{
    font-size: 35pt;
    font-weight: bold;
    fill: white;
}

#modeling:hover .titletext {
  transition: 1s ease;
  visibility: visible;
  opacity: 1;}
</style>
    
</head>
<body>

    <div id="menu">

            <defs>
